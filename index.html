<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arena Strikers: Online Multiplayer</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #101012;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        
        #lobby-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            background: #16161a;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #25252b;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            text-align: center;
        }

        .menu-btn {
            background: #3498db;
            border: none;
            color: white;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 200px;
            transition: background 0.2s;
        }
        .menu-btn:hover { background: #2980b9; }
        #join-btn { background: #2ecc71; }
        #join-btn:hover { background: #27ae60; }

        input {
            background: #202024;
            border: 1px solid #3a3a42;
            color: white;
            padding: 10px;
            font-size: 16px;
            border-radius: 6px;
            text-align: center;
            width: 180px;
        }

        #game-wrapper {
            display: none; /* Hidden until connected */
            flex-direction: row;
            align-items: center;
            gap: 20px;
            background: #16161a;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #25252b;
            position: relative;
            max-width: 95vw;
        }

        @media (max-width: 700px) {
            #game-wrapper { flex-direction: column; padding: 10px; gap: 10px; }
            #sidebar { width: 100% !important; flex-direction: row !important; gap: 5px !important; }
            .panel-box { padding: 6px !important; flex: 1; }
            .score-value { font-size: 24px !important; }
            #timer-value { font-size: 20px !important; }
            #status-text { display: none !important; }
        }

        #sidebar { width: 150px; display: flex; flex-direction: column; gap: 12px; }
        .panel-box { background: rgba(0, 0, 0, 0.5); border: 1px solid #25252b; padding: 10px; border-radius: 8px; text-align: center; }
        .score-title { font-size: 10px; color: #777; letter-spacing: 1px; margin-bottom: 2px; }
        .score-value { font-size: 32px; font-weight: 900; }
        #p-score { color: #00bfff; }
        #a-score { color: #ff4500; }
        #timer-value { color: #f1c40f; font-size: 26px; font-weight: 800; font-family: monospace; }
        #canvas-container { position: relative; }
        canvas { border: 3px solid #3a3a42; border-radius: 6px; background-color: #145a2d; max-width: 100%; max-height: 70vh; display: block; }

        #game-over-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 12, 0.94); display: none; flex-direction: column;
            align-items: center; justify-content: center; border-radius: 6px; z-index: 10;
        }
        #result-status { font-size: 32px; font-weight: 900; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="lobby-container">
        <h2>ARENA STRIKERS ONLINE</h2>
        <div id="lobby-status" style="color: #aaa; margin-bottom: 10px;">Connecting to matchmaking service...</div>
        <button id="host-btn" class="menu-btn" style="display:none;">HOST MATCH</button>
        <div style="margin: 10px 0; color: #555;">— OR —</div>
        <input type="text" id="room-input" placeholder="ENTER ROOM ID" maxlength="4">
        <button id="join-btn" class="menu-btn">JOIN MATCH</button>
    </div>

    <div id="game-wrapper">
        <div id="sidebar">
            <div class="panel-box">
                <div class="score-title" id="role-title">YOUR ROLE</div>
                <div style="font-weight: bold; font-size: 14px;" id="role-value">-</div>
            </div>
            <div class="panel-box">
                <div class="score-title">TIME</div>
                <div id="timer-value">01:00</div>
            </div>
            <div class="panel-box"><div class="score-title">BLUE (P1)</div><div id="p-score" class="score-value">0</div></div>
            <div class="panel-box"><div class="score-title">RED (P2)</div><div id="a-score" class="score-value">0</div></div>
            <div id="status-text" style="font-size: 11px; color:#555; text-align:center;">Tapping with a 2nd finger triggers a Dash Kick!</div>
        </div>

        <div id="canvas-container">
            <canvas id="arena" width="440" height="640"></canvas>
            <div id="game-over-screen">
                <div id="result-status">MATCH OVER</div>
                <div style="color: #aaa; margin-bottom: 20px;" id="final-stats"></div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("arena");
        const ctx = canvas.getContext("2d");

        let peer = null;
        let conn = null;
        let isHost = false; 
        let gameActive = false;

        let scores = { player1: 0, player2: 0 };
        let totalTime = 60;
        let timerInterval = null;

        const padY = 55;
        const goalWidth = 130;
        const goalHeight = 22;
        const goalX = (canvas.width - goalWidth) / 2;
        let goalFlash = 0;

        // Entities (Host controls the master coordinates of the ball)
        const ball = { x: 220, y: 320, vx: 0, vy: 0, radius: 10, mass: 1, color: "#ffffff" };
        const p1 = { x: 220, y: 480, targetX: 220, targetY: 480, radius: 20, mass: 4, color: "#00bfff", isDashing: false, dashTimer: 0 };
        const p2 = { x: 220, y: 160, targetX: 220, targetY: 160, radius: 20, mass: 4, color: "#ff4500", isDashing: false, dashTimer: 0 };

        const friction = 0.982;
        const dashCooldownMax = 45;
        let myCooldown = 0;

        // Initialize connection network links
        function initNetwork() {
            // Generate a secure, short random 4 digit room extension ID
            const randomId = Math.floor(1000 + Math.random() * 9000).toString();
            peer = new Peer('strike-' + randomId);

            peer.on('open', (id) => {
                document.getElementById("lobby-status").innerText = "Ready to play!";
                document.getElementById("host-btn").style.display = "block";
                document.getElementById("host-btn").innerText = `HOST MATCH (ID: ${randomId})`;
            });

            // Host receives inbound connection from Guest
            peer.on('connection', (connection) => {
                if (conn) return; // Room full
                conn = connection;
                isHost = true;
                setupDataChannels();
            });

            peer.on('error', (err) => {
                alert("Connection pipeline error: " + err.type);
            });
        }

        // Setup Lobby Click Handlers
        document.getElementById("host-btn").onclick = () => {
            document.getElementById("lobby-status").innerText = "Waiting for Player 2 to join code...";
        };

        document.getElementById("join-btn").onclick = () => {
            const code = document.getElementById("room-input").value.trim();
            if (!code) return alert("Please enter a valid 4-digit Room ID.");
            
            document.getElementById("lobby-status").innerText = "Connecting...";
            conn = peer.connect('strike-' + code);
            isHost = false;
            setupDataChannels();
        };

        function setupDataChannels() {
            conn.on('open', () => {
                document.getElementById("lobby-container").style.display = "none";
                document.getElementById("game-wrapper").style.display = "flex";
                document.getElementById("role-value").innerText = isHost ? "BLUE (P1)" : "RED (P2)";
                document.getElementById("role-value").style.color = isHost ? "#00bfff" : "#ff4500";
                
                gameActive = true;
                if (isHost) startTimer();
                loop();
            });

            conn.on('data', (data) => {
                if (isHost) {
                    // Host receives client inputs and applies bounds to Guest paddle
                    p2.targetX = data.x;
                    p2.targetY = data.y;
                    if (data.dash) triggerDash(p2);
                } else {
                    // Guest receives positional updates from master Host calculations
                    ball.x = data.bx; ball.y = data.by;
                    p1.x = data.p1x; p1.y = data.p1y; p1.isDashing = data.p1d;
                    p2.x = data.p2x; p2.y = data.p2y; p2.isDashing = data.p2d;
                    scores = data.scores;
                    totalTime = data.time;
                    goalFlash = data.flash;
                    
                    document.getElementById("p-score").innerText = scores.player1;
                    document.getElementById("a-score").innerText = scores.player2;
                    formatTimerDisplay();
                    
                    if (totalTime <= 0) endMatch();
                }
            });

            conn.on('close', () => {
                alert("Opponent disconnected!");
                window.location.reload();
            });
        }

        // --- GAME PHYSICS LOGIC LOOP (Host Computes Everything) ---
        function startTimer() {
            timerInterval = setInterval(() => {
                if (!gameActive) return;
                totalTime--;
                formatTimerDisplay();
                if (totalTime <= 0) endMatch();
            }, 1000);
        }

        function formatTimerDisplay() {
            let minutes = Math.floor(totalTime / 60);
            let seconds = totalTime % 60;
            document.getElementById("timer-value").innerText = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function endMatch() {
            gameActive = false;
            clearInterval(timerInterval);
            document.getElementById("game-over-screen").style.display = "flex";
            document.getElementById("final-stats").innerText = `FINAL RESULTS: BLUE ${scores.player1} - ${scores.player2} RED`;
        }

        function triggerDash(targetPlayer) {
            targetPlayer.isDashing = true;
            targetPlayer.dashTimer = 7;
        }

        // Handle Touch Inputs dynamically mapping layouts
        function handleTouch(e) {
            if (!gameActive || e.touches.length === 0) return;
            e.preventDefault();

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            let touchX = (e.touches[0].clientX - rect.left) * scaleX;
            let touchY = (e.touches[0].clientY - rect.top) * scaleY;

            if (isHost) {
                // Host updates P1 (Restricted to bottom half)
                p1.targetX = Math.min(Math.max(touchX, p1.radius), canvas.width - p1.radius);
                p1.targetY = Math.min(Math.max(touchY, canvas.height / 2 + p1.radius), canvas.height - padY - p1.radius);
            } else {
                // Guest updates P2 (Restricted to top half)
                // We flip the visual axis internally so moving forward pushes toward the center field line
                let boundX = Math.min(Math.max(touchX, p2.radius), canvas.width - p2.radius);
                let boundY = Math.min(Math.max(touchY, padY + p2.radius), canvas.height / 2 - p2.radius);
                conn.send({ x: boundX, y: boundY, dash: false });
            }
        }

        window.addEventListener("touchstart", (e) => {
            if (e.touches.length > 1) {
                if (myCooldown === 0) {
                    if (isHost) { triggerDash(p1); myCooldown = dashCooldownMax; }
                    else { conn.send({ x: p2.targetX, y: p2.targetY, dash: true }); myCooldown = dashCooldownMax; }
                }
            } else { handleTouch(e); }
        }, { passive: false });

        window.addEventListener("touchmove", handleTouch, { passive: false });

        function resolveCollisions(c1, c2, dynamicKick = false) {
            let dx = c2.x - c1.x; let dy = c2.y - c1.y;
            let dist = Math.hypot(dx, dy); let minDist = c1.radius + c2.radius;
            if (dist < minDist) {
                let angle = Math.atan2(dy, dx); let overlap = minDist - dist;
                c1.x -= Math.cos(angle) * overlap * 0.5; c1.y -= Math.sin(angle) * overlap * 0.5;
                c2.x += Math.cos(angle) * overlap * 0.5; c2.y += Math.sin(angle) * overlap * 0.5;
                let nx = dx / dist; let ny = dy / dist;
                let impulse = 2 * (nx * (c1.vx - c2.vx) + ny * (c1.vy - c2.vy)) / (c1.mass + c2.mass);
                c1.vx -= impulse * c2.mass * nx; c1.vy -= impulse * c2.mass * ny;
                c2.vx += impulse * c1.mass * nx; c2.vy += impulse * c1.mass * ny;
                if (dynamicKick) { c2.vx += Math.cos(angle) * 13; c2.vy += Math.sin(angle) * 13; }
            }
        }

        function updateHostPhysics() {
            // Process P1 Movements
            if (p1.isDashing) {
                let angle = Math.atan2(p1.targetY - p1.y, p1.targetX - p1.x);
                p1.vx = Math.cos(angle) * 22; p1.vy = Math.sin(angle) * 22;
                p1.x += p1.vx; p1.y += p1.vy; p1.dashTimer--;
                if (p1.dashTimer <= 0) p1.isDashing = false;
            } else {
                let px = p1.x; let py = p1.y;
                p1.x += (p1.targetX - p1.x) * 0.35; p1.y += (p1.targetY - p1.y) * 0.35;
                p1.vx = p1.x - px; p1.vy = p1.y - py;
            }

            // Process P2 Movements
            if (p2.isDashing) {
                let angle = Math.atan2(p2.targetY - p2.y, p2.targetX - p2.x);
                p2.vx = Math.cos(angle) * 22; p2.vy = Math.sin(angle) * 22;
                p2.x += p2.vx; p2.y += p2.vy; p2.dashTimer--;
                if (p2.dashTimer <= 0) p2.isDashing = false;
            } else {
                let ax = p2.x; let ay = p2.y;
                p2.x += (p2.targetX - p2.x) * 0.35; p2.y += (p2.targetY - p2.y) * 0.35;
                p2.vx = p2.x - ax; p2.vy = p2.y - ay;
            }

            // Ball Updates
            ball.vx *= friction; ball.vy *= friction;
            ball.x += ball.vx; ball.y += ball.vy;

            resolveCollisions(p1, ball, p1.isDashing);
            resolveCollisions(p2, ball, p2.isDashing);
            resolveCollisions(p1, p2);

            // Bounds calculations
            if (ball.x - ball.radius < 0) { ball.x = ball.radius; ball.vx *= -0.8; }
            if (ball.x + ball.radius > canvas.width) { ball.x = canvas.width - ball.radius; ball.vx *= -0.8; }

            // Goal verification logic systems
            if (ball.y - ball.radius < padY) {
                if (ball.x > goalX && ball.x < goalX + goalWidth) {
                    scores.player2++; goalFlash = 10; resetPositions();
                } else { ball.y = padY + ball.radius; ball.vy *= -0.8; }
            }
            if (ball.y + ball.radius > canvas.height - padY) {
                if (ball.x > goalX && ball.x < goalX + goalWidth) {
                    scores.player1++; goalFlash = 10; resetPositions();
                } else { ball.y = canvas.height - padY - ball.radius; ball.vy *= -0.8; }
            }

            document.getElementById("p-score").innerText = scores.player1;
            document.getElementById("a-score").innerText = scores.player2;
            if (goalFlash > 0) goalFlash--;
        }

        function resetPositions() {
            ball.x = 220; ball.y = 320; ball.vx = 0; ball.vy = 0;
        }

        function drawField() {
            ctx.fillStyle = "#1b7a3e"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#156331";
            for(let i = padY; i < canvas.height - padY; i += 60) {
                if((Math.floor((i - padY)/60)) % 2 === 0) ctx.fillRect(0, i, canvas.width, 60);
            }
            ctx.strokeStyle = "rgba(255, 255, 255, 0.5)"; ctx.lineWidth = 4;
            ctx.strokeRect(0, padY, canvas.width, canvas.height - (padY * 2));
            ctx.beginPath(); ctx.moveTo(0, canvas.height / 2); ctx.lineTo(canvas.width, canvas.height / 2); ctx.stroke();
            ctx.beginPath(); ctx.arc(canvas.width / 2, canvas.height / 2, 65, 0, Math.PI * 2); ctx.stroke();
            ctx.fillStyle = "rgba(0,0,0,0.6)";
            ctx.fillRect(goalX, padY - goalHeight, goalWidth, goalHeight);
            ctx.fillRect(goalX, canvas.height - padY, goalWidth, goalHeight);
            ctx.strokeStyle = "#ff4500"; ctx.strokeRect(goalX, padY - goalHeight, goalWidth, goalHeight);
            ctx.strokeStyle = "#00bfff"; ctx.strokeRect(goalX, canvas.height - padY, goalWidth, goalHeight);
        }

        function drawEntity(obj, outlineColor = "#ffffff") {
            ctx.beginPath(); ctx.arc(obj.x, obj.y, obj.radius, 0, Math.PI * 2);
            ctx.fillStyle = obj.color; ctx.fill();
            ctx.strokeStyle = outlineColor; ctx.lineWidth = 3; ctx.stroke();
        }

        function loop() {
            if (!gameActive) return;

            if (isHost) {
                updateHostPhysics();
                // Send current master physics calculations state packet back down to client link
                conn.send({
                    bx: ball.x, by: ball.y,
                    p1x: p1.x, p1y: p1.y, p1d: p1.isDashing,
                    p2x: p2.x, p2y: p2.y, p2d: p2.isDashing,
                    scores: scores, time: totalTime, flash: goalFlash
                });
            }

            if (myCooldown > 0) myCooldown--;

            // Render field frames
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawField();
            drawEntity(p1, p1.isDashing ? "#ffff00" : "#ffffff");
            drawEntity(p2, p2.isDashing ? "#ffff00" : "#ffffff");
            drawEntity(ball, "#222222");

            if (goalFlash > 0) {
                ctx.fillStyle = `rgba(255, 255, 255, ${goalFlash / 10})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            requestAnimationFrame(loop);
        }

        // Wake up network logic engine
        initNetwork();
    </script>
</body>
</html>
