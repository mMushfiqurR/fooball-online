<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Strikers Lite</title>
    <script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #111; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; user-select: none; }
        #lobby-container { display: flex; flex-direction: column; align-items: center; gap: 12px; background: #1a1a1a; padding: 25px; border-radius: 8px; border: 1px solid #333; text-align: center; }
        .menu-btn { background: #3498db; border: none; color: #fff; padding: 10px 20px; font-weight: bold; border-radius: 4px; cursor: pointer; width: 200px; }
        #join-btn { background: #2ecc71; }
        input { background: #222; border: 1px solid #444; color: #fff; padding: 8px; text-align: center; width: 180px; font-weight: bold; }
        #game-wrapper { display: none; align-items: center; gap: 20px; background: #1a1a1a; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        #sidebar { width: 150px; display: flex; flex-direction: column; gap: 10px; font-size: 13px; }
        .panel-box { background: #000; border: 1px solid #222; padding: 8px; border-radius: 4px; text-align: center; }
        .score-title { font-size: 10px; color: #666; margin-bottom: 2px; }
        .score-value { font-size: 32px; font-weight: bold; }
        #p-score { color: #00bfff; }
        #a-score { color: #ff4500; }
        #timer-value { color: #f1c40f; font-size: 24px; font-weight: bold; }
        #canvas-container { position: relative; }
        canvas { border: 2px solid #444; background: #1b7a3e; cursor: none; }
        #game-over-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
    </style>
</head>
<body>

    <div id="lobby-container">
        <h3 style="margin: 0;">STRIKERS LITE</h3>
        <div id="lobby-status" style="color: #f1c40f; font-size: 13px;">Connecting...</div>
        <button id="host-btn" class="menu-btn" style="display:none;"></button>
        <input type="text" id="room-input" placeholder="ROOM CODE" maxlength="4">
        <button id="join-btn" class="menu-btn">JOIN MATCH</button>
    </div>

    <div id="game-wrapper">
        <div id="sidebar">
            <div class="panel-box"><div class="score-title">TEAM</div><div id="role-value">-</div></div>
            <div class="panel-box"><div class="score-title">TIME</div><div id="timer-value">02:00</div></div>
            <div class="panel-box"><div class="score-title">BLUE</div><div id="p-score" class="score-value">0</div></div>
            <div class="panel-box"><div class="score-title">RED</div><div id="a-score" class="score-value">0</div></div>
        </div>
        <div id="canvas-container">
            <canvas id="arena" width="460" height="680"></canvas>
            <div id="game-over-screen">
                <h2 style="margin:0;">MATCH ENDED</h2>
                <div id="final-stats" style="font-family:monospace; margin-top:10px;"></div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("arena"), ctx = canvas.getContext("2d");
        let peer = null, conn = null, isHost = false, gameActive = false;
        let scores = { p1: 0, p2: 0 }, totalTime = 120, timerInterval = null;
        const padY = 60, goalW = 140, goalX = 160;
        let goalFlash = 0;

        const ball = { x: 230, y: 340, vx: 0, vy: 0, r: 11 }, p1 = { x: 230, y: 500, tx: 230, ty: 500, r: 21, d: false, dt: 0 }, p2 = { x: 230, y: 180, tx: 230, ty: 180, r: 21, d: false, dt: 0 };
        let myCooldown = 0;

        function initNetwork() {
            const rid = Math.floor(1000 + Math.random() * 9000).toString();
            peer = new Peer('strk-' + rid);
            peer.on('open', () => {
                document.getElementById("lobby-status").innerText = "Ready";
                const hBtn = document.getElementById("host-btn");
                hBtn.style.display = "block"; hBtn.innerText = `HOST (${rid})`;
            });
            peer.on('connection', c => { if (!conn) { conn = c; isHost = true; bindEvents(); } });
        }

        document.getElementById("join-btn").onclick = () => {
            const code = document.getElementById("room-input").value.trim();
            if(code) { conn = peer.connect('strk-' + code); isHost = false; bindEvents(); }
        };

        function bindEvents() {
            conn.on('open', () => {
                document.getElementById("lobby-container").style.display = "none";
                document.getElementById("game-wrapper").style.display = "flex";
                document.getElementById("role-value").innerText = isHost ? "BLUE" : "RED";
                document.getElementById("role-value").style.color = isHost ? "#00bfff" : "#ff4500";
                gameActive = true; if (isHost) startTimer(); loop();
            });
            conn.on('data', d => {
                if (isHost) {
                    p2.tx = canvas.width - d[0]; p2.ty = canvas.height - d[1];
                    if (d[2]) triggerDash(p2);
                } else {
                    ball.x = d[0]; ball.y = d[1]; p1.x = d[2]; p1.y = d[3]; p1.d = d[4]; p2.x = d[5]; p2.y = d[6]; p2.d = d[7];
                    scores.p1 = d[8]; scores.p2 = d[9]; totalTime = d[10]; goalFlash = d[11];
                    document.getElementById("p-score").innerText = scores.p1;
                    document.getElementById("a-score").innerText = scores.p2;
                    updateTimerUI(); if (d[12]) endMatch();
                }
            });
        }

        function startTimer() {
            timerInterval = setInterval(() => { if (gameActive) { totalTime--; updateTimerUI(); if (totalTime <= 0) endMatch(); } }, 1000);
        }

        function updateTimerUI() {
            document.getElementById("timer-value").innerText = `${Math.floor(totalTime/60).toString().padStart(2,'0')}:${(totalTime%60).toString().padStart(2,'0')}`;
        }

        function endMatch() {
            gameActive = false; clearInterval(timerInterval);
            document.getElementById("game-over-screen").style.display = "flex";
            document.getElementById("final-stats").innerText = `BLUE ${scores.p1} - ${scores.p2} RED`;
        }

        function triggerDash(p) { if (!p.d) { p.d = true; p.dt = 7; } }

        window.addEventListener("mousemove", e => {
            if (!gameActive) return;
            const r = canvas.getBoundingClientRect(), rx = e.clientX - r.left, ry = e.clientY - r.top;
            if (isHost) {
                p1.tx = Math.max(21, Math.min(439, rx)); p1.ty = Math.max(361, Math.min(620, ry));
            } else {
                let bx = Math.max(21, Math.min(439, rx)), by = Math.max(361, Math.min(620, ry));
                if (conn?.open) conn.send([bx, by, 0]);
            }
        });

        window.addEventListener("mousedown", e => {
            if (!gameActive || myCooldown > 0 || e.button !== 0) return;
            myCooldown = 45;
            if (isHost) triggerDash(p1); else if (conn?.open) conn.send([p2.tx, p2.ty, 1]);
        });

        function bounce(c1, c2, dash) {
            let dx = c2.x - c1.x, dy = c2.y - c1.y, dist = Math.hypot(dx, dy), min = c1.r + c2.r;
            if (dist < min) {
                let ax = dx / dist, ay = dy / dist, o = min - dist;
                c1.x -= ax * o * 0.5; c1.y -= ay * o * 0.5; c2.x += ax * o * 0.5; c2.y += ay * o * 0.5;
                let k = 2 * (ax * (c1.vx - c2.vx) + ay * (c1.vy - c2.vy)) / 5;
                c1.vx -= k * nx; c1.vy -= k * ny; c2.vx += k * 4 * ax; c2.vy += k * 4 * ay;
                if (dash) { c2.vx += ax * 14; c2.vy += ay * 14; }
            }
        }

        function updateHostPhysics() {
            let x1 = p1.x, y1 = p1.y, x2 = p2.x, y2 = p2.y;
            if (p1.d) { let a = Math.atan2(p1.ty-p1.y, p1.tx-p1.x); p1.x += Math.cos(a)*22; p1.y += Math.sin(a)*22; if (--p1.dt <= 0) p1.d = false; }
            else { p1.x += (p1.tx - p1.x) * 0.35; p1.y += (p1.ty - p1.y) * 0.35; }
            p1.vx = p1.x - x1; p1.vy = p1.y - y1;

            if (p2.d) { let a = Math.atan2(p2.ty-p2.y, p2.tx-p2.x); p2.x += Math.cos(a)*22; p2.y += Math.sin(a)*22; if (--p2.dt <= 0) p2.d = false; }
            else { p2.x += (p2.tx - p2.x) * 0.35; p2.y += (p2.ty - p2.y) * 0.35; }
            p2.vx = p2.x - x2; p2.vy = p2.y - y2;

            ball.vx *= 0.982; ball.vy *= 0.982; ball.x += ball.vx; ball.y += ball.vy;
            bounce(p1, ball, p1.d); bounce(p2, ball, p2.d);
            
            if (ball.x - 11 < 0) { ball.x = 11; ball.vx *= -0.8; }
            if (ball.x + 11 > 460) { ball.x = 449; ball.vx *= -0.8; }
            if (ball.y - 11 < padY) {
                if (ball.x > goalX && ball.x < goalX + goalW) { scores.p2++; goalFlash = 10; ball.x = 230; ball.y = 340; ball.vx = ball.vy = 0; }
                else { ball.y = padY + 11; ball.vy *= -0.8; }
            }
            if (ball.y + 11 > 620) {
                if (ball.x > goalX && ball.x < goalX + goalW) { scores.p1++; goalFlash = 10; ball.x = 230; ball.y = 340; ball.vx = ball.vy = 0; }
                else { ball.y = 609; ball.vy *= -0.8; }
            }
            document.getElementById("p-score").innerText = scores.p1;
            document.getElementById("a-score").innerText = scores.p2;
            if (goalFlash > 0) goalFlash--;
        }

        function drawCircle(x, y, r, f, s) { ctx.beginPath(); ctx.arc(x, y, r, 0, 6.28); ctx.fillStyle = f; ctx.fill(); ctx.strokeStyle = s; ctx.lineWidth = 3; ctx.stroke(); }

        function loop() {
            if (!gameActive) return;
            if (isHost) {
                updateHostPhysics();
                conn.send([ball.x, ball.y, p1.x, p1.y, p1.d, p2.x, p2.y, p2.d, scores.p1, scores.p2, totalTime, goalFlash, totalTime <= 0]);
                if (totalTime <= 0) endMatch();
            }
            if (myCooldown > 0) myCooldown--;

            ctx.clearRect(0,0,460,680); ctx.save();
            if (!isHost) { ctx.translate(230, 340); ctx.rotate(Math.PI); ctx.translate(-230, -340); }

            ctx.fillStyle = "#156331"; for(let i=padY; i<620; i+=120) ctx.fillRect(0, i, 460, 60);
            ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.lineWidth = 4; ctx.strokeRect(0, padY, 460, 560);
            ctx.beginPath(); ctx.moveTo(0, 340); ctx.lineTo(460, 340); ctx.arc(230, 340, 70, 0, 6.28); ctx.stroke();
            
            ctx.fillStyle = "rgba(0,0,0,0.4)"; ctx.fillRect(goalX, padY-25, goalW, 25); ctx.fillRect(goalX, 620, goalW, 25);
            ctx.strokeStyle = "#ff4500"; ctx.strokeRect(goalX, padY-25, goalW, 25);
            ctx.strokeStyle = "#00bfff"; ctx.strokeRect(goalX, 620, goalW, 25);

            drawCircle(p1.x, p1.y, 21, "#00bfff", p1.d ? "#fff" : "#111");
            drawCircle(p2.x, p2.y, 21, "#ff4500", p2.d ? "#fff" : "#111");
            drawCircle(ball.x, ball.y, 11, "#fff", "#222");

            if (goalFlash > 0) { ctx.fillStyle = `rgba(255,255,255,${goalFlash/10})`; ctx.fillRect(0,0,460,680); }
            ctx.restore(); requestAnimationFrame(loop);
        }
        initNetwork();
    </script>
</body>
</html>
